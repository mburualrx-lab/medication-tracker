<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-card">
        <p class="page-nav"><a href="index.html">← Back to login</a></p>
        <div class="header-row">
            <div>
                <h1>Doctor Dashboard</h1>
                <p>Welcome, <strong id="user-name"></strong>.</p>
            </div>
            <button class="logout-btn" id="logout-button">Logout</button>
        </div>

        <p id="page-status" class="auth-message"></p>

        <section class="info-card">
            <h2>Prescription Center</h2>
            <p>Create a medication plan for a patient and it will appear on their medication page with the reminder time.</p>
        </section>

        <section>
            <h2>Send a prescription</h2>
            <form id="prescription-form">
                <label for="patient-id">Patient ID</label>
                <input type="number" id="patient-id" value="1" required>

                <label for="medication-name">Medication Name</label>
                <input type="text" id="medication-name" placeholder="e.g. Amoxicillin" required>

                <label for="dosage">Dosage</label>
                <input type="text" id="dosage" placeholder="e.g. 500mg" required>

                <label for="frequency">Reminder Time</label>
                <input type="time" id="frequency" required>

                <button type="submit">Send Prescription</button>
            </form>
            <p id="doctor-status" class="auth-message"></p>
        </section>

        <section>
            <h2>Current prescriptions</h2>
            <ul id="prescription-list"></ul>
        </section>
    </div>

    <script src="auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!ensureRolePageAccess('doctor')) {
                return;
            }

            injectUserName('#user-name');
            document.getElementById('logout-button').addEventListener('click', logout);

            const form = document.getElementById('prescription-form');
            const statusBox = document.getElementById('doctor-status');
            const prescriptionList = document.getElementById('prescription-list');

            async function refreshPrescriptions() {
                const patientId = document.getElementById('patient-id').value;
                if (!patientId) return;

                try {
                    const prescriptions = await loadPrescriptions(patientId);
                    prescriptionList.innerHTML = '';
                    if (!prescriptions.length) {
                        const item = document.createElement('li');
                        item.textContent = 'No prescriptions found for this patient yet.';
                        prescriptionList.appendChild(item);
                        return;
                    }

                    prescriptions.forEach((prescription) => {
                        const item = document.createElement('li');
                        item.innerHTML = `💊 <strong>${prescription.medication_name}</strong><br><span>${prescription.dosage} • ${prescription.frequency}</span>`;
                        prescriptionList.appendChild(item);
                    });
                } catch (error) {
                    statusBox.textContent = error.message || 'Unable to load prescriptions.';
                    statusBox.className = 'auth-message error';
                }
            }

            form.addEventListener('submit', async (event) => {
                event.preventDefault();
                const patientId = document.getElementById('patient-id').value;
                const medicationName = document.getElementById('medication-name').value.trim();
                const dosage = document.getElementById('dosage').value.trim();
                const frequency = document.getElementById('frequency').value;

                if (!patientId || !medicationName || !dosage || !frequency) {
                    statusBox.textContent = 'Please complete all fields.';
                    statusBox.className = 'auth-message error';
                    return;
                }

                try {
                    await submitPrescription({
                        patientId,
                        medicationName,
                        dosage,
                        frequency: `At ${frequency}`,
                        doctorName: getAuthUser().name
                    });
                    statusBox.textContent = 'Prescription sent successfully.';
                    statusBox.className = 'auth-message success';
                    form.reset();
                    document.getElementById('patient-id').value = patientId;
                    await refreshPrescriptions();
                } catch (error) {
                    statusBox.textContent = error.message || 'Could not send prescription.';
                    statusBox.className = 'auth-message error';
                }
            });

            await refreshPrescriptions();
        });
    </script>
</body>
</html>
