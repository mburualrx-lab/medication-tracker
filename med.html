<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MedMinder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-card">
        <p class="page-nav"><a href="index.html">← Back to login</a></p>
        <h1>My Medication Tracker</h1>
        <p class="privacy-note"><em>Welcome, <strong id="user-name"></strong>. Your medication list is synced with the Python backend.</em></p>

        <form id="med-form">
            <label for="med-name">Medication Name:</label>
            <input type="text" id="med-name" required>

            <label for="med-time">Time:</label>
            <input type="time" id="med-time" required>

            <button type="submit">Add Medication</button>
        </form>

        <p id="page-status" class="auth-message"></p>
        <p id="sync-status" class="auth-message"></p>

        <h2>Today's Schedule</h2>
        <ul id="med-list"></ul>
    </div>

    <script src="auth.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!ensureRolePageAccess('user')) {
                return;
            }
            injectUserName('#user-name');
        });
    </script>
</body>
</html>
