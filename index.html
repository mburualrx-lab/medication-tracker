<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedMinder Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-card">
        <h1>Patient Login</h1>
        <p class="auth-message" id="auth-message"></p>

        <form id="login-form">
            <input type="hidden" id="role" value="user">

            <label for="email">Email</label>
            <input type="email" id="email" placeholder="user@example.com" required>

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password" required>

            <button type="submit">Login</button>
        </form>

        <div class="info-card">
            <p>Use these sample patient credentials to log in:</p>
            <ul>
                <li><strong>Patient:</strong> user@example.com / user123</li>
            </ul>
            <p>
                not recorded? Get recorded..
                <a href="patient.html">patient</a>
            </p>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            redirectIfAuthenticated();
        });
    </script>
</body>
</html>
