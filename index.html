<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedMinder Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-card">
        <h1>Login</h1>
        <p class="auth-message" id="auth-message"></p>

        <form id="login-form">
            <label for="role">Role</label>
            <select id="role">
                <option value="user">Patient</option>
                <option value="doctor">Doctor</option>
            </select>

            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Enter your name" required>

            <label for="email">Email</label>
            <input type="email" id="email" placeholder="user@example.com" required>

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password" required>

            <button type="submit">Login</button>
        </form>

        <hr>

        <h2>Register New Account</h2>
        <form id="register-form">
            <label for="register-role">Role</label>
            <select id="register-role">
                <option value="user">Patient</option>
                <option value="doctor">Doctor</option>
            </select>

            <label for="register-name">Full Name</label>
            <input type="text" id="register-name" placeholder="Enter your name" required>

            <label for="register-email">Email</label>
            <input type="email" id="register-email" placeholder="new@example.com" required>

            <label for="register-password">Password</label>
            <input type="password" id="register-password" placeholder="Create password" required>

            <button type="submit">Create Account</button>
        </form>

        <div class="info-card">
            <p id="page-status" class="auth-message"></p>
            <p>Use these sample credentials to log in:</p>
            <ul>
                <li><strong>Patient:</strong> user@example.com / user123</li>
                <li><strong>Doctor:</strong> doctor@example.com / doctor123</li>
            </ul>
            <p>
                Want to open the doctor dashboard directly? <a href="doctor.html">Doctor page</a>
            </p>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            redirectIfAuthenticated();
        });
    </script>
</body>
</html>
